services:
  - type: web
    name: taller-pro-api
    runtime: python
    region: ohio
    buildCommand: cd backend && pip install -r requirements.txt
    preDeployCommand: cd backend && python -m alembic upgrade head
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taller-pro-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: "HS256"
      - key: ENVIRONMENT
        value: production

  - type: web
    name: taller-pro-client
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist/taller-pro/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: taller-pro-db
    region: ohio
    plan: free

<div class="page-container">
  <div class="header">
    <div>
      <h2><i class="fa-solid fa-bell text-primary me-2"></i> Centro de Notificaciones</h2>
      <p>Historial de alertas, emergencias y pagos</p>
    </div>
    <button *ngIf="esTecnico" class="btn-back" (click)="volver()">Volver</button>
  </div>

  <div *ngIf="cargando" class="loading-state">
    <i class="fa-solid fa-circle-notch fa-spin me-2"></i> Cargando tu historial...
  </div>

  <div *ngIf="!cargando && notificaciones.length === 0" class="empty-state">
    <span class="empty-icon"><i class="fa-regular fa-folder-open text-muted"></i></span>
    <h3>No tienes notificaciones</h3>
    <p>Aquí aparecerán los avisos de nuevos auxilios y actualizaciones.</p>
  </div>

  <div class="notificaciones-list" *ngIf="!cargando && notificaciones.length > 0">
    
    <div *ngFor="let noti of notificaciones" 
         class="noti-card" 
         [ngClass]="{'unread': !noti.leido}">
      <div class="noti-icon">
        <span *ngIf="noti.tipo === 'emergencia'"><i class="fa-solid fa-triangle-exclamation text-danger"></i></span>
        <span *ngIf="noti.tipo === 'pago'"><i class="fa-solid fa-wallet text-success"></i></span>
        <span *ngIf="noti.tipo === 'sistema'"><i class="fa-solid fa-gears text-secondary"></i></span>
        <span *ngIf="!['emergencia', 'pago', 'sistema'].includes(noti.tipo)"><i class="fa-solid fa-bell text-primary"></i></span>
      </div>

      <div class="noti-content">
        <div class="noti-header">
          <h4>{{ noti.titulo }}</h4>
          <span class="noti-date">{{ noti.fecha_envio | date:'short' }}</span>
        </div>
        <p>{{ noti.mensaje }}</p>
      </div>

      <div class="noti-actions">
        <button *ngIf="!noti.leido" class="btn-read" (click)="marcarComoLeida(noti.id)">
          <i class="fa-solid fa-check me-1"></i> Marcar como leída
        </button>
      </div>
      
      <div class="unread-dot" *ngIf="!noti.leido"></div>
    </div>

  </div>
</div>
